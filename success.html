<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تم استقبال طلبك بنجاح - مناحل الجنوب</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --gold: #d4af37; 
            --dark-bg: #111111; 
            --dark-card: #1a1a1a; 
            --text-light: #f5f5f5; 
            --text-muted: #aaaaaa; 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }
        
        /* تصليح الخلفية وجعلها داكنة ملكية مع توهج ذهبي خفيف في الوسط */
        body { 
            background-color: var(--dark-bg); 
            background-image: radial-gradient(circle at center, rgba(212, 175, 55, 0.04) 0%, #111111 70%);
            color: var(--text-light); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px; 
        }
        
        /* كارت النجاح المطور */
        .success-card { 
            background: var(--dark-card); 
            border: 1px solid rgba(212, 175, 55, 0.12); 
            padding: 50px 30px; 
            border-radius: 20px; 
            text-align: center; 
            max-width: 500px; 
            width: 100%; 
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7); 
            position: relative; 
        }
        
        .status-container {
            position: relative;
            width: 90px;
            height: 90px;
            margin: 0 auto 30px auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .status-circle { 
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(212, 175, 55, 0.03); 
            border: 3px solid rgba(212, 175, 55, 0.2); 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 2rem; 
            font-weight: 900;
            color: var(--gold);
            transition: all 0.4s ease;
        }

        /* أنيميشن الدوران حول العداد */
        .status-circle.loading::after {
            content: '';
            position: absolute;
            top: -3px; left: -3px; right: -3px; bottom: -3px;
            border: 3px solid transparent;
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        /* حالة اكتمال التثبيت واهتزاز الأيقونة */
        .status-circle.verified-active {
            border-color: var(--gold);
            background: rgba(212, 175, 55, 0.15);
            animation: popCheck 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .status-circle i {
            display: none;
            font-size: 2.4rem;
        }

        h2 { font-size: 1.75rem; color: var(--gold); font-weight: 900; margin-bottom: 15px; transition: all 0.3s ease; }
        p { color: var(--text-light); font-size: 1.05rem; margin-bottom: 10px; opacity: 0; transform: translateY(10px); transition: all 0.5s ease 0.3s; }
        p.sub { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 35px; line-height: 1.7; font-weight: 300; }
        
        /* تفعيل ظهور النصوص تدريجياً */
        .success-card.ready p { opacity: 1; transform: translateY(0); }

        /* زر العودة للرئيسية */
        .back-home-btn { 
            background: linear-gradient(135deg, var(--gold) 0%, #b38f1d 100%); 
            color: #000; 
            padding: 14px 35px; 
            border-radius: 30px; 
            font-weight: 700; 
            text-decoration: none; 
            font-size: 1rem; 
            display: inline-flex; 
            align-items: center; 
            gap: 10px; 
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.2); 
            transition: all 0.3s; 
            opacity: 0;
            pointer-events: none;
            transform: scale(0.9);
        }
        .success-card.ready .back-home-btn {
            opacity: 1;
            pointer-events: auto;
            transform: scale(1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.5s;
        }
        .back-home-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(212, 175, 55, 0.4); }
        
        /* تأثيرات الحركة (Keyframes) */
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes popCheck {
            0% { transform: scale(0.8); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); box-shadow: 0 0 20px rgba(212, 175, 55, 0.3); }
        }
    </style>
</head>
<body>

    <div class="success-card" id="cardContainer">
        <div class="status-container">
            <div class="status-circle loading" id="statusBox">3</div>
        </div>
        
        <h2 id="mainHeading">جاري معالجة وتأكيد طلبك...</h2>
        <p>مرحباً بك في عائلة مناحل الجنوب.</p>
        <p class="sub">لقد استلمنا تفاصيل طلبيتك وسيقوم فريقنا بالاتصال بك هاتفياً في أقرب وقت لتأكيد الشحن والتوصيل (الدفع عند الاستلام).</p>
        
        <a href="index.html" class="back-home-btn">العودة للرئيسية <i class="fa-solid fa-house"></i></a>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const statusBox = document.getElementById("statusBox");
            const mainHeading = document.getElementById("mainHeading");
            const cardContainer = document.getElementById("cardContainer");
            
            let countdown = 3;

            const interval = setInterval(() => {
                countdown--;
                if (countdown > 0) {
                    statusBox.innerText = countdown;
                } else {
                    clearInterval(interval);
                    triggerSuccess();
                }
            }, 1000);

            function triggerSuccess() {
                // تفعيل حالة التحقق المكتملة
                statusBox.classList.remove("loading");
                statusBox.classList.add("verified-active");
                
                // تغيير الرقم إلى أيقونة الصح الجذابة
                statusBox.innerHTML = '<i class="fa-solid fa-check" style="display: block;"></i>';
                
                // تحديث النصوص والأنيميشن التابع لها
                mainHeading.innerText = "شكراً لك! تم تسجيل طلبك بنجاح";
                cardContainer.classList.add("ready");
            }
        });
    </script>
</body>
</html>
